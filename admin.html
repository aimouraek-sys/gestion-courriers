<!DOCTYPE html>
<html dir="auto" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ إدارة المستخدمين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 950px;
            width: 100%;
        }
        .admin-box h1 { color: #1e3c72; text-align: center; margin-bottom: 10px; }
        .admin-box .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #8b5cf6;
        }
        .btn-create {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); }
        .btn-delete {
            padding: 5px 12px; border: none; border-radius: 6px;
            background: #ef4444; color: white; font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-size: 12px;
        }
        .btn-delete:hover { background: #dc2626; }
        .users-list { max-height: 400px; overflow-y: auto; }
        .user-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: #f9fafb;
            border: 1px solid #e5e7eb; border-radius: 8px;
            margin-bottom: 8px;
        }
        .user-item .user-info { display: flex; flex-direction: column; gap: 2px; }
        .user-item .user-info .uname { font-weight: 600; color: #1e3c72; }
        .user-item .user-info .udetails { font-size: 13px; color: #6b7280; }
        .badge-admin {
            padding: 2px 10px; border-radius: 12px; font-size: 11px;
            font-weight: 600; background: #fef3c7; color: #92400e; margin-left: 8px;
        }
        .badge-viewer {
            padding: 2px 10px; border-radius: 12px; font-size: 11px;
            font-weight: 600; background: #dbeafe; color: #1e40af; margin-left: 8px;
        }
        .msg {
            padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none;
        }
        .msg.success { background: #d1fae5; color: #065f46; display: block; }
        .msg.error { background: #fee2e2; color: #dc2626; display: block; }
        .msg.info { background: #dbeafe; color: #1e40af; display: block; }
        .admin-actions {
            margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee;
            display: flex; gap: 15px; flex-wrap: wrap;
        }
        .admin-actions .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px;
        }
        .admin-actions .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }
        .admin-actions .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4); }
        .admin-actions .btn-danger { background: #dc2626; color: white; }
        .admin-actions .btn-danger:hover { background: #b91c1c; }
        .admin-actions .btn-secondary { background: #6b7280; color: white; }
        .admin-actions .btn-secondary:hover { background: #4b5563; }
        .footer-note {
            margin-top: 20px; padding: 15px; background: #f3f4f6;
            border-radius: 8px; font-size: 13px; color: #6b7280; text-align: center;
        }
        .footer-note strong { color: #1e3c72; }
        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
            .admin-box { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>⚙️ إدارة المستخدمين</h1>
        <p class="subtitle">إنشاء وإدارة حسابات المستخدمين لتطبيق إدارة المراسلات</p>

        <div id="msg" class="msg"></div>

        <div class="admin-grid">
            <div>
                <h3 style="color:#1e3c72; margin-bottom:15px; font-size:16px;">➕ إنشاء مستخدم جديد</h3>
                <div class="form-group">
                    <label>👤 اسم المستخدم *</label>
                    <input type="text" id="username" placeholder="اسم المستخدم">
                </div>
                <div class="form-group">
                    <label>🔑 كلمة المرور *</label>
                    <input type="text" id="password" placeholder="4 أحرف على الأقل">
                </div>
                <div class="form-group">
                    <label>🏢 المكتب / الخدمة *</label>
                    <input type="text" id="service" placeholder="مثال: المكتب الفلاني, قسم الموارد البشرية">
                </div>
                <div class="form-group">
                    <label>🏛️ المؤسسة / الشركة *</label>
                    <input type="text" id="societe" placeholder="مثال: شركة X, وزارة Y">
                </div>
                <div class="form-group">
                    <label>🔐 الصلاحية (Rôle) *</label>
                    <select id="role">
                        <option value="admin">⭐ مسؤول (Ajout/Modification/Suppression)</option>
                        <option value="viewer">👁️ مشاهد (Consultation seule)</option>
                    </select>
                </div>
                <button class="btn-create" onclick="createUser()">📝 إنشاء المستخدم</button>
            </div>

            <div>
                <h3 style="color:#1e3c72; margin-bottom:15px; font-size:16px;">📋 قائمة المستخدمين</h3>
                <div id="usersList" class="users-list"></div>
            </div>
        </div>

        <div class="admin-actions">
            <button class="btn btn-secondary" onclick="refreshUsersList()">🔄 تحديث القائمة</button>
            <button class="btn btn-danger" onclick="resetAllUsers()">🗑 حذف جميع المستخدمين</button>
            <button class="btn btn-primary" onclick="location.reload()">📌 Recharger</button>
        </div>

        <div class="footer-note">
            💡 <strong>Compte admin par défaut :</strong> admin / admin123<br>
            <span style="font-size:12px;">👁️ <strong>Viewer :</strong> consultation seule sans modification</span>
        </div>
    </div>

    <script>
        function getUsers() {
            const data = localStorage.getItem('app_users');
            if (data) {
                return JSON.parse(data);
            }
            const defaultUsers = {
                'admin': {
                    password: 'admin123',
                    service: 'Administration',
                    societe: 'Système',
                    isAdmin: true,
                    role: 'admin'
                }
            };
            localStorage.setItem('app_users', JSON.stringify(defaultUsers));
            return defaultUsers;
        }

        function saveUsers(users) {
            localStorage.setItem('app_users', JSON.stringify(users));
        }

        function createUser() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const service = document.getElementById('service').value.trim();
            const societe = document.getElementById('societe').value.trim();
            const role = document.getElementById('role').value;

            if (!username || !password || !service || !societe) {
                showMsg('الرجاء ملء جميع الحقول', 'error');
                return;
            }

            if (password.length < 4) {
                showMsg('كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'error');
                return;
            }

            const users = getUsers();
            if (users[username]) {
                showMsg('اسم المستخدم موجود بالفعل', 'error');
                return;
            }

            users[username] = {
                password: password,
                service: service,
                societe: societe,
                isAdmin: role === 'admin',
                role: role
            };
            saveUsers(users);

            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('service').value = '';
            document.getElementById('societe').value = '';

            showMsg(`✅ تم إنشاء المستخدم "${username}" بنجاح! (${role === 'admin' ? '⭐ مسؤول' : '👁️ مشاهد'})`, 'success');
            refreshUsersList();
        }

        function deleteUser(username) {
            if (username === 'admin') {
                showMsg('لا يمكن حذف حساب المسؤول الرئيسي', 'error');
                return;
            }

            if (confirm(`هل أنت متأكد من حذف المستخدم "${username}" نهائياً؟`)) {
                const users = getUsers();
                delete users[username];
                saveUsers(users);
                refreshUsersList();
                showMsg(`✅ تم حذف المستخدم "${username}"`, 'success');
            }
        }

        function refreshUsersList() {
            const users = getUsers();
            const container = document.getElementById('usersList');
            
            const usernames = Object.keys(users).sort();
            if (usernames.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">لا يوجد مستخدمين</div>';
                return;
            }

            container.innerHTML = usernames.map(uname => {
                const data = users[uname];
                const isAdmin = data.isAdmin || data.role === 'admin';
                const roleText = isAdmin ? '⭐ مسؤول' : '👁️ مشاهد';
                const roleBadge = isAdmin ? 
                    '<span class="badge-admin">⭐ مسؤول</span>' : 
                    '<span class="badge-viewer">👁️ مشاهد</span>';
                const delBtn = !isAdmin ? 
                    `<button class="btn-delete" onclick="deleteUser('${uname}')">🗑 حذف</button>` :
                    '<span style="font-size:12px; color:#999;">🔒</span>';
                
                return `
                    <div class="user-item">
                        <div class="user-info">
                            <span class="uname">👤 ${escapeHtml(uname)} ${roleBadge}</span>
                            <span class="udetails">🏢 ${escapeHtml(data.service || '-')} | 🏛️ ${escapeHtml(data.societe || '-')}</span>
                        </div>
                        ${delBtn}
                    </div>
                `;
            }).join('');
        }

        function resetAllUsers() {
            if (confirm('⚠️ ATTENTION : Cette action va supprimer TOUS les utilisateurs (sauf admin). Continuer ?')) {
                if (confirm('DERNIER AVERTISSEMENT : Tous les comptes seront perdus. Confirmer ?')) {
                    const users = getUsers();
                    const newUsers = {
                        'admin': users['admin'] || {
                            password: 'admin123',
                            service: 'Administration',
                            societe: 'Système',
                            isAdmin: true,
                            role: 'admin'
                        }
                    };
                    saveUsers(newUsers);
                    refreshUsersList();
                    showMsg('✅ Tous les utilisateurs (sauf admin) ont été supprimés', 'info');
                }
            }
        }

        function showMsg(msg, type) {
            const el = document.getElementById('msg');
            el.textContent = msg;
            el.className = 'msg ' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && (active.id === 'username' || active.id === 'password' || 
                               active.id === 'service' || active.id === 'societe' || active.id === 'role')) {
                    createUser();
                }
            }
        });

        refreshUsersList();
        showMsg('💡 Compte admin par défaut: admin / admin123 | 👁️ Viewer: consultation seule', 'info');
    </script>
</body>
</html>
